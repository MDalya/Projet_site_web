<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Dalya Meharzi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <header class="profile-card">
                <div class="profile-info">
                    <div class="nom">MEHARZI Dalya</div>
                    <div class="sous-titre">Dashboard de Productivité</div>
                </div>
            </header>

            <div class="stats-box">
                <p id="statsText">0% des tâches complétées</p>
                <div class="progress-bar"><div id="progressBar"></div></div>
            </div>

            <section class="task-form">
                <input type="text" id="taskInput" placeholder="Quelle est la mission ?">
                <select id="taskCategory">
                    <option value="Cours">Cours</option>
                    <option value="Perso">Perso</option>
                    <option value="Travail">Travail</option>
                    <option value="Asso">Asso</option>
                </select>
                <button id="addBtn">Ajouter</button>
            </section>

            <main class="grid-container" id="taskGrid"></main>
        </div>

        <footer>
            <p>Code et design Dalya MEHARZI © 2026</p>
        </footer>
    </div>
    <script src="script.js?v=3"></script>
</body>
</html>
