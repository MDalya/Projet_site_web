<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalya Meharzi | Focus Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <header class="app-header">
            <div class="profile-compact">
                <img src="medias/Photodeprofil.png" class="profile-img" alt="Profile" onerror="this.src='https://ui-avatars.com/api/?name=DM&background=1ABC9C&color=fff'">
                <div class="profile-text">
                    <h1>Dalya Meharzi</h1>
                    <p>Focus Flow Dashboard</p>
                </div>
            </div>
            <div class="header-status">
                <span class="status-badge"><img src="icons/icons8-tic-tac-32.png" class="icon" alt="Timer"> Objectifs 2026</span>
            </div>
        </header>

        <section class="task-form-container">
            <div class="task-form">
                <input type="text" id="taskInput" placeholder="Quelle est la prochaine mission ?">
                <select id="taskCategory">
                    <option value="Cours">📚 Cours</option>
                    <option value="Perso">🏠 Perso</option>
                    <option value="Travail">💼 Travail</option>
                    <option value="Projet">🚀 Projet</option>
                </select>
                <button id="addBtn" class="add-btn">+</button>
            </div>
        </section>

        <main class="grid-container" id="taskGrid">
            </main>

    </div>

    <footer>
        <p>Design & Code by Dalya Meharzi · 2026 ©</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
