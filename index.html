<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalya | Dashboard Productivité</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <header class="profile-card">
            <div class="pdp">
                <img src="medias/Photodeprofil.png" class="profile-img" alt="Profile" onerror="this.src='https://ui-avatars.com/api/?name=Dalya+Meharzi&background=6c5ce7&color=fff'">
            </div>
            <div class="profile-info">
                <h1 class="nom">Dalya Meharzi</h1>
                <div class="infos">
                    <span><img src="icons/icons8-téléphone-50.png" class="icon" alt="Focus"> Focus Mode</span>
                    <span><img src="icons/icons8-tic-tac-32.png" class="icon" alt="Timer"> Objectifs 2026</span>
                </div>
            </div>
        </header>

        <section class="task-form">
            <input type="text" id="taskInput" placeholder="Nouvelle mission...">
            <select id="taskCategory">
                <option value="Cours">📚 Cours</option>
                <option value="Perso">🏠 Perso</option>
                <option value="Travail">💼 Travail</option>
                <option value="Projet">🚀 Projet</option>
            </select>
            <button id="addBtn" class="add-btn">Ajouter</button>
        </section>

        <main class="grid-container" id="taskGrid">
            </main>

    </div>

    <footer>
        <p>Maîtrise ton temps · 2026 © Dalya Meharzi</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
