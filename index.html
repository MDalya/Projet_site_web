<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="main-wrapper">
        <header class="profile-card"><h1>MEHARZI Dalya</h1></header>
        <section class="task-form">
            <input type="text" id="taskInput" placeholder="Mission...">
            <select id="taskCategory">
                <option value="Cours">Cours</option>
                <option value="Perso">Perso</option>
                <option value="Travail">Travail</option>
                <option value="Asso">Asso</option>
            </select>
            <button id="addBtn" style="background:#238636">Ajouter</button>
        </section>
        <main class="grid-container" id="taskGrid"></main>
    </div>
    <footer>Code et design Dalya MEHARZI © 2026</footer>
    <script src="script.js"></script>
</body>
</html>
