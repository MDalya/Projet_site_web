<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalya Meharzi | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="profile-card">
            <div class="pdp">
                <img src="medias/Photodeprofil.png" class="profile-img" alt="Profile Picture">
            </div>
            <div class="profile-info">
                <div class="nom">MEHARZI Dalya IR3</div>
                <div class="infos">
                    <span>
                        <img src="icons/icons8-téléphone-50.png" class="icon" alt="Phone Icon">
                        OPPO A73
                    </span>
                    <span>
                        <img src="icons/icons8-tic-tac-32.png" class="icon" alt="Timer Icon">
                        Max2022
                    </span>
                    <span>
                        <img src="icons/icons8-facebook-nouveau-50.png" class="icon" alt="Facebook Icon">
                        MaxSM
                    </span>
                </div>
            </div>
        </header>

        <div class="stats-container">
            <div class="progress-bar-bg"><div id="progressBar" class="progress-bar-fill"></div></div>
            <p id="statsText">0% complété</p>
        </div>

        <section class="task-form">
            <input type="text" id="taskInput" placeholder="Nouvelle mission...">
            <select id="taskCategory">
                <option value="Cours">📚 Cours</option>
                <option value="Perso">🏠 Perso</option>
                <option value="Travail">💼 Travail</option>
                <option value="Asso">🤝 Asso</option> </select>
            <button id="addBtn" class="add-btn">+</button>
        </section>

        <main class="grid-container" id="taskGrid"></main>
    </div>

    <script src="script.js"></script>
</body>
</html>
