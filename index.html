<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginPage" class="login-wrapper">
        <div class="card">
            <h1>Connexion</h1>
            <input type="text" id="loginNom" placeholder="Nom">
            <input type="text" id="loginPrenom" placeholder="Prénom">
            <input type="email" id="loginMail" placeholder="Email">
            <button id="loginBtn">Se connecter</button>
        </div>
    </div>

    <div id="app" class="main-wrapper" style="display: none;">
        <header class="profile-card">
            <div class="profile-info">
                <h1 id="userName"></h1>
                <p id="userTitle" contenteditable="true">Dashboard de Productivité</p>
                <button id="logoutBtn" style="background: #da3633; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Déconnexion</button>
            </div>
        </header>

        <section class="task-form">
            <input type="text" id="taskInput" placeholder="Mission...">
            <select id="taskCategory">
                <option value="Cours">📚 Cours</option>
                <option value="Perso">🏠 Perso</option>
            </select>
            <button id="addBtn">Ajouter</button>
        </section>

        <main class="grid-container" id="taskGrid"></main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
