<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Productivité</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginPage" class="login-wrapper">
        <div class="login-card">
            <h1>Connexion</h1>
            <input type="text" id="loginNom" placeholder="Nom">
            <input type="text" id="loginPrenom" placeholder="Prénom">
            <input type="email" id="loginMail" placeholder="Email">
            <button id="loginBtn">Se connecter</button>
            <button id="guestBtn" class="btn-guest">Entrer en mode invité</button>
        </div>
    </div>

    <div id="app" class="main-wrapper" style="display: none;">
        <header class="profile-card">
            <div class="profile-layout">
                <label for="fileInput" id="avatarLabel" class="avatar-label">
                    <img src="icons/default-pp.png" alt="Profil" class="profile-img" id="profileImg">
                </label>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                
                <div class="profile-info">
                    <h1 id="userName"></h1>
                    <p id="userTitle">Ma Productivité</p>
                    <button id="logoutBtn" class="btn-supprimer-link">Déconnexion</button>
                </div>
            </div>
        </header>

        <div class="progress-container">
            <div class="progress-info">
                <span>Progression des missions</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
        </div>

        <section class="task-form">
            <input type="text" id="taskInput" placeholder="Quelle est la mission ?">
            <select id="taskCategory">
                <option value="Cours">📚 Cours</option>
                <option value="Perso">🏠 Perso</option>
                <option value="Travail">💼 Travail</option>
                <option value="Asso">🤝 Asso</option>
            </select>
            <button id="addBtn">Ajouter</button>
        </section>

        <main class="grid-container" id="taskGrid"></main>
    </div>

    <footer>Code et design Dalya MEHARZI © 2026</footer>
    <script type="module" src="script.js"></script>
</body>
</html>
